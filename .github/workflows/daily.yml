name: Daily update
# Fetches new papers every morning (06:00 China time) and commits the data.
# New papers still get best-effort abstracts (Crossref -> OpenAlex -> publisher);
# the larger backlog top-up is OFF here -- run the backfill manually for that.
# Also runnable anytime via the "Run workflow" button.
on:
  schedule:
    - cron: "0 22 * * *"     # 22:00 UTC = 06:00 China time (UTC+8)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run daily aggregate (new papers only)
        env:
          OPENALEX_KEY: ${{ secrets.OPENALEX_KEY }}
        run: python aggregate.py
      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
