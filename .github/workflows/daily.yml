name: Daily update
# Runs aggregate.py every morning to fetch new papers, then commits the data.
# Also runnable manually anytime from the Actions tab via "Run workflow".
on:
  schedule:
    - cron: "0 22 * * *"     # 22:00 UTC = 06:00 China time (UTC+8)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run daily aggregate
        env:
          OPENALEX_KEY: ${{ secrets.OPENALEX_KEY }}
        run: python aggregate.py
      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
