name: Historical backfill (one-time)

# Manual only: go to the Actions tab, pick this workflow, click "Run workflow".
# It pulls the back-catalogue from Crossref (since start_date in feeds.py) and
# commits the data files. Re-running is safe; results merge and de-duplicate.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch + count only, write nothing)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run backfill
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python backfill.py --dry-run
          else
            python backfill.py --repair-abstracts --repair-limit 6000
          fi
      - name: Commit data
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Historical backfill: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
